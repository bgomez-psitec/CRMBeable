{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CRM Gestora — Iniciar sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body class="dc-login-body">
  <div class="dc-login-card">
    <div class="dc-login-header">
      <div class="dc-login-logo">⬡ <span>Beable</span></div>
      <div class="dc-login-sub">CRM Gestora de Fondos</div>
    </div>
    <div class="dc-login-body-inner">
      {% if error %}
        <div class="dc-alert dc-alert--danger mb-3">
          <i class="bi bi-exclamation-triangle"></i> {{ error }}
        </div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="dc-login-field">
          <label>Email</label>
          <div class="dc-input-wrap">
            <i class="bi bi-envelope"></i>
            <input type="email" name="email" required placeholder="usuario@empresa.com">
          </div>
        </div>
        <div class="dc-login-field">
          <label>Contraseña</label>
          <div class="dc-input-wrap">
            <i class="bi bi-lock"></i>
            <input type="password" name="password" required placeholder="••••••••">
          </div>
        </div>
        <button type="submit" class="dc-login-btn">Entrar</button>
      </form>

      {% if demo_users %}
        <div style="margin-top:24px;border-top:1px solid var(--dc-border);padding-top:16px">
          <p style="font-size:.75rem;color:var(--dc-text-muted);text-align:center;margin-bottom:10px">Acceso rápido (demo)</p>
          <div style="display:flex;flex-direction:column;gap:6px">
            {% for u in demo_users %}
              <form method="post" action="{% url 'accounts:quick_login' u.id %}">
                {% csrf_token %}
                <button type="submit" class="btn-ghost w-100" style="justify-content:flex-start;font-size:.82rem">
                  <i class="bi bi-person-circle" style="color:var(--dc-accent)"></i>
                  {{ u.get_full_name }}
                  <span style="margin-left:auto;font-size:.75rem;color:var(--dc-text-muted)">{{ u.get_role_display }}</span>
                </button>
              </form>
            {% endfor %}
          </div>
        </div>
      {% endif %}
    </div>
  </div>
</body>
</html>
