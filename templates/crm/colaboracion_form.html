{% extends "base.html" %}
{% load django_bootstrap5 %}
{% block title %}{{ title }} — CRM Gestora{% endblock %}
{% block topbar_title %}{{ title }}{% endblock %}
{% block content %}
<div class="dc-card dc-card__body" style="max-width:600px">
  <form method="post" class="dc-form">
    {% csrf_token %}
    {% bootstrap_form form %}
    <div class="d-flex gap-2 mt-3">
      <button type="submit" class="btn-accent">Guardar</button>
      <a href="{% url 'crm:company_detail' company.pk %}" class="btn-ghost">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
