{% extends "base.html" %}
{% load django_bootstrap5 %}
{% block title %}{{ title }} — CRM Gestora{% endblock %}
{% block topbar_title %}{{ title }}{% endblock %}
{% block content %}
<form method="post" class="card card-body" style="max-width:640px">
  {% csrf_token %}
  {% bootstrap_form form %}
  <button type="submit" class="btn btn-warning">Guardar</button>
</form>
{% endblock %}
