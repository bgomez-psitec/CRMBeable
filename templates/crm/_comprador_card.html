{% load crm_filters %}
<div class="col-md-6">
  <div class="dc-card h-100" style="cursor:pointer" onclick="location.href='{% url 'crm:comprador_detail' card.comprador.pk %}'">
    <div class="dc-card__body">
      <div class="d-flex justify-content-between align-items-start">
        <div>
          <div class="fw-semibold">{{ card.comprador.name }}</div>
          <div style="font-size:.8rem;color:var(--dc-text-muted)">{{ card.comprador.country }}{% if card.comprador.type %} · {{ card.comprador.type }}{% endif %}</div>
        </div>
        <span class="dc-badge dc-badge--grey">{{ card.activos }} en proceso</span>
      </div>
      {% if card.comprador.sectors %}<div style="font-size:.8rem;color:var(--dc-text-muted);margin-top:4px">{{ card.comprador.sectors }}</div>{% endif %}
    </div>
  </div>
</div>
